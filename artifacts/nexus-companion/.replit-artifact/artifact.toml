kind = "web"
previewPath = "/"
title = "Nexus Companion"
version = "1.0.0"
id = "artifacts/nexus-companion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22868

[services.development]
run = "pnpm --filter @workspace/nexus-companion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexus-companion", "run", "build" ]
publicDir = "artifacts/nexus-companion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22868"
BASE_PATH = "/"
